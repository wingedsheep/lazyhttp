name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Run the suite on every supported OS so platform-specific code
        # (the build-tagged shell runners, CRLF handling) is caught here
        # rather than after a tag is cut.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - run: go build ./...
      - run: go test ./...
      - run: go vet ./...
