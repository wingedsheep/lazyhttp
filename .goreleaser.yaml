version: 2

project_name: lazyhttp

before:
  hooks:
    - go mod tidy

builds:
  - id: lazyhttp
    binary: lazyhttp
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    # Predictable, version-less names so the curl installer can always fetch
    # `…/releases/latest/download/lazyhttp_<os>_<arch>.tar.gz` (and Scoop / a
    # manual download can fetch `lazyhttp_windows_<arch>.zip`).
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    # Windows ships a .zip instead — the native archive format there, and what
    # Scoop expects. The binary inside is lazyhttp.exe (GoReleaser appends .exe).
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: wingedsheep
    name: lazyhttp

# Pushes a Homebrew cask to github.com/wingedsheep/homebrew-tap on each release,
# so `brew install wingedsheep/tap/lazyhttp` works. Needs HOMEBREW_TAP_TOKEN
# (a PAT scoped to the tap repo) in the workflow env.
homebrew_casks:
  - name: lazyhttp
    binaries:
      - lazyhttp
    homepage: "https://github.com/wingedsheep/lazyhttp"
    description: "Terminal UI for running .http test plans step by step"
    license: "MIT"
    repository:
      owner: wingedsheep
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # The released binary is unsigned; strip the quarantine flag on install so
    # macOS Gatekeeper doesn't refuse to run it.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/lazyhttp"]
          end

# Pushes a Scoop manifest to github.com/wingedsheep/scoop-bucket on each release,
# so Windows users can `scoop bucket add wingedsheep https://github.com/wingedsheep/scoop-bucket`
# then `scoop install lazyhttp`. Needs SCOOP_BUCKET_TOKEN (a PAT scoped to the
# bucket repo) in the workflow env — the Windows analogue of the Homebrew tap.
scoops:
  - name: lazyhttp
    homepage: "https://github.com/wingedsheep/lazyhttp"
    description: "Terminal UI for running .http test plans step by step"
    repository:
      owner: wingedsheep
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
